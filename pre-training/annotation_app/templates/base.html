<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Meme Annotation{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav>
        <a href="{{ url_for('index') }}" class="nav-brand">Meme Annotation</a>
        <div class="nav-links">
            {% if session.get('annotator') %}
                <span class="nav-user">{{ session.annotator }}</span>
                <a href="{{ url_for('annotate') }}">Annotate</a>
            {% endif %}
            {% if session.get('is_admin') %}
                <a href="{{ url_for('dashboard') }}">Dashboard</a>
            {% endif %}
            {% if session.get('annotator') %}
                <a href="{{ url_for('logout') }}">Logout</a>
            {% endif %}
        </div>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
